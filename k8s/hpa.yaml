# Horizontal Pod Autoscaler — scales app pods between 2 and 10
# based on CPU usage. Requires metrics-server in the cluster.
# Install: kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yesudas-app-hpa
  namespace: yesudas-ministries
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: yesudas-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
