# Store sensitive values in a Kubernetes Secret.
# Replace every <base64-encoded-value> with: echo -n "your_value" | base64
#
# Example:
#   echo -n "my-strong-password" | base64
#
# NEVER commit real secrets to git — use Sealed Secrets, External Secrets Operator,
# or your cloud provider's secret manager in production.
apiVersion: v1
kind: Secret
metadata:
  name: yesudas-secrets
  namespace: yesudas-ministries
type: Opaque
data:
  POSTGRES_PASSWORD: <base64-encoded-value>
  ADMIN_SESSION_SECRET: <base64-encoded-value>
  SMTP_USER: <base64-encoded-value>
  SMTP_PASS: <base64-encoded-value>
  RAZORPAY_KEY_SECRET: <base64-encoded-value>
  STRIPE_SECRET_KEY: <base64-encoded-value>
  STRIPE_WEBHOOK_SECRET: <base64-encoded-value>
  YOUTUBE_API_KEY: <base64-encoded-value>
